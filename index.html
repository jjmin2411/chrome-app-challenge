<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles.css" />
    <title>Chrome app</title>
  </head>
  <body>
    <div class="custom-cursor"></div>
    <header>
      <div class="header__logOut hidden">Log out</div>
      <div class="margin-div" style="margin-left: 150px"></div>
      <div class="header__time clock-js">
        <div class="header__time__value">00:00:00</div>
        <div class="header__time__date"></div>
      </div>
      <div class="header__weathers">
        <div class="header__weathers__place"></div>
        <div class="header__weathers__temprature"></div>
        <div class="header__weathers__condition"></div>
      </div>
    </header>
    <main>
      <form class="main__loginForm">
        <input
          id="login-input"
          placeholder="Please write your name . . ."
          required
        />
        <button id="login-button" type="submit">Log in</button>
      </form>
      <div class="main__todo hidden">
        <h1 id="greeting"></h1>
        <div class="main__todoForm-container">
          <form class="main__todoForm">
            <input
              class="main__todoForm__input"
              id="todo-input"
              placeholder="What needs to be done?"
              required
            />
            <button id="todo-button" type="submit">Add</button>
          </form>
        </div>
        <ul id="todo-list"></ul>
      </div>
    </main>
    <script src="./js/weather.js"></script>
    <script src="./js/cursor.js"></script>
    <script src="./js/logOut.js"></script>
    <script src="./js/backGround.js"></script>
    <script src="./js/clock.js"></script>
    <script src="./js/todo.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
